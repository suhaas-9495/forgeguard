model:
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  torch_dtype: "float16"
  device_map: "auto"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"

training:
  output_dir: "models/adapters/phase1"
  num_train_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.001
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  fp16: true
  gradient_checkpointing: true
  max_seq_length: 512
  dataloader_num_workers: 0
  remove_unused_columns: false
  report_to: "none"

calibration:
  output_dir: "models/adapters/phase2"
  num_train_epochs: 3
  confidence_threshold: 0.6
  refusal_threshold: 0.4
  n_bins: 10

evaluation:
  batch_size: 4
  max_new_tokens: 150
  temperature: 0.1
  do_sample: false

self_improvement:
  max_iterations: 5
  min_improvement_threshold: 0.02
  high_confidence_wrong_threshold: 0.75
  synthetic_data_per_iteration: 100
  output_dir: "models/adapters/self_improved"

paths:
  data_dir: "data"
  logs_dir: "logs"
  outputs_dir: "outputs"
  plots_dir: "outputs/plots"
  metrics_dir: "outputs/metrics"
